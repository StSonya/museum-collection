<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова експозиція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/STLLoader.js"></script>
  <style>
    .card {
      transition: all 0.25s ease;
      border: none;
      border-radius: 12px;
      overflow: hidden;
    }
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.12)!important;
    }
    .card-img-top {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3 sticky-top">
    <div class="container">
      <span class="museum-name text-muted fs-5">Назва музею</span>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <input type="text" id="searchInput" class="form-control" placeholder="Пошук за назвою або інвентарним номером..." style="width: 360px;">
        <a href="https://твій-музей-сайт.ua" class="btn btn-outline-secondary" target="_blank">На головну</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="fw-light text-center mb-5">Експозиція</h1>
    <div id="exhibitsGrid" class="row justify-content-center g-4"></div>

    <div class="text-center mt-5">
      <button id="loadMoreBtn" class="btn btn-primary btn-lg px-5">Показати ще</button>
    </div>

    <div id="pagination" class="d-flex justify-content-center gap-3 mt-4"></div>
  </div>

  <footer class="bg-white border-top py-4 text-center text-muted small">
    © Ваш Музей • Цифрова колекція
  </footer>

  <script>
    let allItems = [];
    let filteredItems = [];
    let currentPage = 1;
    const itemsPerPage = 12;

    async function loadData() {
      const res = await fetch('data.json?' + new Date().getTime());
      const data = await res.json();
      allItems = data.collection || [];
      filteredItems = [...allItems];
      render();
    }

    function render() {
      const grid = document.getElementById('exhibitsGrid');
      grid.innerHTML = '';

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filteredItems.slice(start, end);

      pageItems.forEach(item => {
        const photo = item.photos && item.photos[0] ? item.photos[0] : 'assets/photos/Photo.png';
        
        const cardHTML = `
          <div class="col-12 col-md-6 col-lg-4 col-xl-3">
            <div class="card h-100 shadow-sm" style="cursor:pointer;" onclick="showDetail('${item.id}')">
              <img src="${photo}" class="card-img-top" alt="${item.title}">
              <div class="card-body text-center">
                <small class="text-muted">${item.inventory}</small>
                <h5 class="card-title mt-2">${item.title}</h5>
                <p class="card-text text-muted small">${item.shortDesc || ''}</p>
              </div>
            </div>
          </div>`;
        grid.insertAdjacentHTML('beforeend', cardHTML);
      });

      updatePagination();
      document.getElementById('loadMoreBtn').style.display = (end < filteredItems.length) ? 'inline-block' : 'none';
    }

    function updatePagination() {
      const totalPages = Math.ceil(filteredItems.length / itemsPerPage);
      let html = '';
      if (totalPages > 1) {
        html += `<button class="btn btn-outline-secondary px-4" onclick="prevPage()" ${currentPage===1?'disabled':''}>Попередні</button>`;
        html += `<span class="align-self-center mx-4">Сторінка ${currentPage} з ${totalPages}</span>`;
        html += `<button class="btn btn-outline-secondary px-4" onclick="nextPage()" ${currentPage===totalPages?'disabled':''}>Наступні</button>`;
      }
      document.getElementById('pagination').innerHTML = html;
    }

    window.prevPage = () => { if (currentPage > 1) { currentPage--; render(); } };
    window.nextPage = () => { if (currentPage < Math.ceil(filteredItems.length / itemsPerPage)) { currentPage++; render(); } };

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      filteredItems = allItems.filter(item => 
        item.title.toLowerCase().includes(term) || 
        (item.inventory && item.inventory.toLowerCase().includes(term))
      );
      currentPage = 1;
      render();
    });

    document.getElementById('loadMoreBtn').addEventListener('click', () => {
      currentPage++;
      render();
    });

    // ========== МОДАЛЬНЕ ВІКНО З STL ==========
    window.showDetail = function(id) {
      const item = allItems.find(i => i.id === id);
      if (!item) return;

      const photoPath = item.photos && item.photos[0] ? item.photos[0] : 'assets/photos/Photo.png';
      const normalPath = item.normalMap || 'assets/normalmaps/Cactus_u0_v0_normal.png';
      const stlPath = item.stl || 'assets/models/Cactus.stl';   // ← твій файл

      let modalHTML = `
        <div class="modal fade" id="detailModal" tabindex="-1">
          <div class="modal-dialog modal-xl">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">${item.title}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <ul class="nav nav-tabs mb-3">
                  <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-desc">Опис</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-photo">Фото</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-normal">Нормалі</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-form">Форма</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-object">Об'єкт</a></li>
                </ul>
                <div class="tab-content">
                  <div class="tab-pane fade show active" id="tab-desc">
                    <table class="table table-borderless">
                      <tr><td><strong>Інвентарний номер:</strong></td><td>${item.inventory}</td></tr>
                      <tr><td><strong>Назва:</strong></td><td>${item.title}</td></tr>
                      <tr><td><strong>Дата створення:</strong></td><td>${item.date || ''}</td></tr>
                      <tr><td><strong>Матеріал:</strong></td><td>${item.material || ''}</td></tr>
                      <tr><td><strong>Техніка:</strong></td><td>${item.technique || ''}</td></tr>
                      <tr><td><strong>Розміри:</strong></td><td>${item.dimensions || ''}</td></tr>
                      <tr><td><strong>Місце знахідки:</strong></td><td>${item.origin || ''}</td></tr>
                    </table>
                    <hr>
                    <p><strong>Опис:</strong> ${item.description || '—'}</p>
                  </div>
                  <div class="tab-pane fade" id="tab-photo">
                    <img src="${photoPath}" class="img-fluid rounded" alt="${item.title}">
                  </div>
                  <div class="tab-pane fade" id="tab-normal">
                    <img src="${normalPath}" class="img-fluid rounded" alt="Карта нормалей">
                  </div>
                  <div class="tab-pane fade" id="tab-form" style="height:520px; background:#f8f9fa;">
                    <canvas id="stlCanvas" style="width:100%; height:100%;"></canvas>
                  </div>
                  <div class="tab-pane fade" id="tab-object" style="height:520px;">
                    <iframe src="https://sketchfab.com/models/33556cd311d64a0c924c091bf750cd45/embed" 
                            style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
              </div>
            </div>
          </div>
        </div>`;

      const old = document.getElementById('detailModal');
      if (old) old.remove();

      document.body.insertAdjacentHTML('beforeend', modalHTML);
      const modal = new bootstrap.Modal(document.getElementById('detailModal'));
      modal.show();

      // Ініціалізація STL після показу вкладки
      setTimeout(() => {
        initSTLViewer(stlPath);
      }, 500);
    };

    function initSTLViewer(stlPath) {
      const canvas = document.getElementById('stlCanvas');
      if (!canvas) return;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, canvas.clientWidth / canvas.clientHeight, 0.1, 1000);
      const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
      renderer.setSize(canvas.clientWidth, canvas.clientHeight);
      renderer.setClearColor(0xf8f9fa);

      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(10, 10, 5);
      scene.add(directionalLight);

      const loader = new THREE.STLLoader();
      loader.load(stlPath, function (geometry) {
        const material = new THREE.MeshPhongMaterial({ color: 0x4a90e2, shininess: 30 });
        const mesh = new THREE.Mesh(geometry, material);
        
        geometry.computeBoundingBox();
        const center = geometry.boundingBox.getCenter(new THREE.Vector3());
        mesh.position.sub(center);

        const size = geometry.boundingBox.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        mesh.scale.setScalar(15 / maxDim);

        scene.add(mesh);
        camera.position.z = 30;
      });

      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }
      animate();

      // Обертання мишкою (простий варіант)
      let isDragging = false;
      let previousMouseX = 0;
      canvas.addEventListener('mousedown', () => isDragging = true);
      canvas.addEventListener('mouseup', () => isDragging = false);
      canvas.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        const delta = e.movementX * 0.005;
        scene.rotation.y += delta;
      });
    }

    window.onload = loadData;
  </script>
</body>
</html>
