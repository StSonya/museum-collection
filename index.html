<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGICURE — Цифрова експозиція</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- === Додано для STL-в'ювера === -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        #stl-container { width: 100%; height: 520px; background: #f8fafc; border-radius: 12px; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">
    <!-- Навігація -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-4xl">📸</span>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">DIGICURE</h1>
                    <p class="text-zinc-400 text-sm -mt-1">Цифрова експозиція</p>
                </div>
            </div>
            <a href="https://github.com/ВАШ_ЮЗЕРНЕЙМ/digicure-exhibition" target="_blank"
               class="text-zinc-400 hover:text-white flex items-center gap-2 text-sm">
                <span>Редагувати на GitHub</span>
                <span class="text-xl">↗</span>
            </a>
        </div>
    </nav>

    <!-- Герой -->
    <header class="bg-gradient-to-br from-zinc-900 to-black py-16 text-center">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-5xl md:text-6xl font-bold mb-4">Роботи студентів курсу DIGICURE</h1>
            <p class="text-2xl text-zinc-400">Фотограмметрія та RTI — інтерактивна експозиція</p>
        </div>
    </header>

    <!-- Фільтри -->
    <div class="max-w-7xl mx-auto px-6 py-8 border-b border-zinc-800">
        <div id="filters" class="flex flex-wrap gap-3 justify-center">
            <button data-filter="all" class="filter-btn active px-8 py-3 rounded-3xl text-lg font-medium bg-white text-zinc-950">Всі моделі</button>
            <button data-filter="photogrammetry" class="filter-btn px-8 py-3 rounded-3xl text-lg font-medium border border-zinc-700 hover:border-white">Фотограмметрія</button>
            <button data-filter="rti" class="filter-btn px-8 py-3 rounded-3xl text-lg font-medium border border-zinc-700 hover:border-white">RTI</button>
        </div>
    </div>

    <!-- Галерея -->
    <div id="gallery" class="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Заповнюється JavaScript -->
    </div>

    <!-- МОДАЛЬНЕ ВІКНО (оновлене з вкладками) -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 z-[9999] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-5xl max-h-[92vh] flex flex-col modal shadow-2xl text-zinc-900 overflow-hidden">
            <!-- Заголовок -->
            <div class="px-8 py-5 border-b flex items-center justify-between">
                <div>
                    <h2 id="modal-title" class="text-3xl font-semibold"></h2>
                    <p id="modal-author" class="text-zinc-600"></p>
                </div>
                <button onclick="closeModal()" class="text-4xl leading-none text-zinc-400 hover:text-black">×</button>
            </div>

            <!-- Вкладки -->
            <div class="flex border-b text-sm">
                <button onclick="switchTab(0)" id="tab0" class="tab-btn px-6 py-4 font-medium border-b-2 border-transparent hover:text-black">Опис</button>
                <button onclick="switchTab(1)"
