<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова колекція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

  <!-- Навбар з назвою музею -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
    <div class="container">
      <span class="museum-name text-muted fs-5">Назва музею</span>
      
      <div class="ms-auto d-flex align-items-center">
        <input type="text" id="searchInput" class="form-control me-3" placeholder="Пошук експонату..." style="max-width: 260px;">
        <a href="catalog.html" class="btn btn-outline-dark btn-sm">Весь каталог</a>
      </div>
    </div>
  </nav>

  <!-- Стрічка експозиційних тем (можна вимкнути) -->
  <div class="border-bottom bg-white">
    <div class="container px-0">
      <ul class="nav nav-scroll nav-tabs border-0 pt-2 px-3" id="themeTabs"></ul>
    </div>
  </div>

  <div class="container py-5">
    <h1 class="fw-light text-center mb-5">Експозиція</h1>
    <div id="exhibitsGrid" class="row row-cols-1 row-cols-md-3 g-4"></div>
  </div>

  <footer class="bg-white border-top py-4 text-center text-muted small">
    © Ваш Музей • Цифрова колекція
  </footer>

  <script src="data.json"></script>
  <script src="assets/js/main.js"></script>

</html>
