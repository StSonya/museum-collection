<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова експозиція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
    <div class="container">
      <span class="museum-name text-muted fs-5">Назва музею</span>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="fw-light text-center mb-5">Експозиція</h1>
    
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm" style="cursor:pointer;" onclick="showDetail()">
          <img src="assets/photos/Photo.png" class="card-img-top" style="height: 320px; object-fit: cover;" alt="Горщик ліпний">
          <div class="card-body text-center">
            <small class="text-muted">МК-001</small>
            <h5 class="card-title mt-2">Горщик ліпний</h5>
            <p class="card-text text-muted small">X–XI ст., слов'янська кераміка</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-white border-top py-4 text-center text-muted small">
    © Ваш Музей • Цифрова колекція
  </footer>

  <script>
    function showDetail() {
      let modalHTML = `
        <div class="modal fade" id="detailModal" tabindex="-1">
          <div class="modal-dialog modal-xl">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Горщик ліпний</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <ul class="nav nav-tabs mb-3">
                  <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-desc">Опис</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-photo">Фото</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-volume">Об’єм</a></li>
                </ul>
                <div class="tab-content">
                  <!-- Повний музейний опис -->
                  <div class="tab-pane fade show active" id="tab-desc">
                    <table class="table table-borderless">
                      <tr><td><strong>Інвентарний номер:</strong></td><td>МК-001</td></tr>
                      <tr><td><strong>Назва:</strong></td><td>Горщик ліпний</td></tr>
                      <tr><td><strong>Дата створення:</strong></td><td>X–XI ст.</td></tr>
                      <tr><td><strong>Період / культура:</strong></td><td>Ранньослов'янська культура</td></tr>
                      <tr><td><strong>Матеріал:</strong></td><td>Глина</td></tr>
                      <tr><td><strong>Техніка виготовлення:</strong></td><td>Ліплення від руки</td></tr>
                      <tr><td><strong>Розміри:</strong></td><td>Висота 18 см, діаметр 15 см</td></tr>
                      <tr><td><strong>Місце знахідки:</strong></td><td>с. Іванівка, розкопки 2018 р.</td></tr>
                      <tr><td><strong>Зберігач:</strong></td><td>Краєзнавчий музей</td></tr>
                      <tr><td><strong>Стан збереження:</strong></td><td>Добрий</td></tr>
                      <tr><td><strong>Автор / виробник:</strong></td><td>невідомий</td></tr>
                    </table>
                    <hr>
                    <p><strong>Опис:</strong> Ліпний горщик з характерним орнаментом. Типовий зразок ранньослов'янської кераміки. Має сліди копчення на зовнішній поверхні.</p>
                  </div>

                  <div class="tab-pane fade" id="tab-photo">
                    <img src="assets/photos/Photo.png" class="img-fluid rounded" alt="Горщик ліпний">
                  </div>

                  <div class="tab-pane fade" id="tab-volume" style="height:520px;">
                    <iframe src="https://sketchfab.com/models/33556cd311d64a0c924c091bf750cd45/embed" 
                            style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
              </div>
            </div>
          </div>
        </div>`;

      const old = document.getElementById('detailModal');
      if (old) old.remove();

      document.body.insertAdjacentHTML('beforeend', modalHTML);
      new bootstrap.Modal(document.getElementById('detailModal')).show();
    }
  </script>
</body>
</html>
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGICURE — Цифрова експозиція</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- === Додано для STL-в'ювера === -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        #stl-container { width: 100%; height: 520px; background: #f8fafc; border-radius: 12px; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">
    <!-- Навігація -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-4xl">📸</span>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">DIGICURE</h1>
                    <p class="text-zinc-400 text-sm -mt-1">Цифрова експозиція</p>
                </div>
            </div>
            <a href="https://github.com/ВАШ_ЮЗЕРНЕЙМ/digicure-exhibition" target="_blank"
               class="text-zinc-400 hover:text-white flex items-center gap-2 text-sm">
                <span>Редагувати на GitHub</span>
                <span class="text-xl">↗</span>
            </a>
        </div>
    </nav>

    <!-- Герой -->
    <header class="bg-gradient-to-br from-zinc-900 to-black py-16 text-center">
        <div class="max-w-4xl mx-auto px-6">
            <h1 class="text-5xl md:text-6xl font-bold mb-4">Роботи студентів курсу DIGICURE</h1>
            <p class="text-2xl text-zinc-400">Фотограмметрія та RTI — інтерактивна експозиція</p>
        </div>
    </header>

    <!-- Фільтри -->
    <div class="max-w-7xl mx-auto px-6 py-8 border-b border-zinc-800">
        <div id="filters" class="flex flex-wrap gap-3 justify-center">
            <button data-filter="all" class="filter-btn active px-8 py-3 rounded-3xl text-lg font-medium bg-white text-zinc-950">Всі моделі</button>
            <button data-filter="photogrammetry" class="filter-btn px-8 py-3 rounded-3xl text-lg font-medium border border-zinc-700 hover:border-white">Фотограмметрія</button>
            <button data-filter="rti" class="filter-btn px-8 py-3 rounded-3xl text-lg font-medium border border-zinc-700 hover:border-white">RTI</button>
        </div>
    </div>

    <!-- Галерея -->
    <div id="gallery" class="max-w-7xl mx-auto px-6 py-12 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        <!-- Заповнюється JavaScript -->
    </div>

    <!-- МОДАЛЬНЕ ВІКНО (оновлене з вкладками) -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 z-[9999] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl w-full max-w-5xl max-h-[92vh] flex flex-col modal shadow-2xl text-zinc-900 overflow-hidden">
            <!-- Заголовок -->
            <div class="px-8 py-5 border-b flex items-center justify-between">
                <div>
                    <h2 id="modal-title" class="text-3xl font-semibold"></h2>
                    <p id="modal-author" class="text-zinc-600"></p>
                </div>
                <button onclick="closeModal()" class="text-4xl leading-none text-zinc-400 hover:text-black">×</button>
            </div>

            <!-- Вкладки -->
            <div class="flex border-b text-sm">
                <button onclick="switchTab(0)" id="tab0" class="tab-btn px-6 py-4 font-medium border-b-2 border-transparent hover:text-black">Опис</button>
                <button onclick="switchTab(1)"
