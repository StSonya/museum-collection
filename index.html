<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова експозиція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    .card { transition: all 0.2s; }
    .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1)!important; }
  </style>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3 sticky-top">
    <div class="container">
      <span class="museum-name text-muted fs-5">Назва музею</span>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <input type="text" id="searchInput" class="form-control" placeholder="Пошук за назвою або інвентарним номером..." style="width: 340px;">
        <a href="https://твій-музей-сайт.ua" class="btn btn-outline-secondary" target="_blank">На головну</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="fw-light text-center mb-5">Експозиція</h1>
    <div id="exhibitsGrid" class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4"></div>

    <div class="text-center mt-5">
      <button id="loadMoreBtn" class="btn btn-primary btn-lg px-5">Показати ще</button>
    </div>
  </div>

  <footer class="bg-white border-top py-4 text-center text-muted small">
    © Ваш Музей • Цифрова колекція
  </footer>

  <script>
    let allItems = [];
    let filteredItems = [];
    let currentPage = 1;
    const itemsPerPage = 12;

    async function loadData() {
      const res = await fetch('data.json?' + new Date().getTime()); // примусовий кеш-брейк
      const data = await res.json();
      allItems = data.collection || [];
      filteredItems = [...allItems];
      render();
    }

    function render() {
      const grid = document.getElementById('exhibitsGrid');
      grid.innerHTML = '';

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageItems = filteredItems.slice(start, end);

      pageItems.forEach(item => {
        const photo = item.photos && item.photos[0] ? item.photos[0] : 'assets/photos/Photo.png';
        
        const cardHTML = `
          <div class="col">
            <div class="card border-0 shadow-sm h-100" style="cursor:pointer;" onclick="showDetail('${item.id}')">
              <img src="${photo}" class="card-img-top" style="height: 260px; object-fit: cover;" alt="${item.title}">
              <div class="card-body text-center">
                <small class="text-muted">${item.inventory}</small>
                <h5 class="card-title mt-2">${item.title}</h5>
                <p class="card-text text-muted small">${item.shortDesc || ''}</p>
              </div>
            </div>
          </div>`;
        grid.insertAdjacentHTML('beforeend', cardHTML);
      });

      document.getElementById('loadMoreBtn').style.display = (end < filteredItems.length) ? 'inline-block' : 'none';
    }

    window.showDetail = function(id) {
      const item = allItems.find(i => i.id === id);
      if (!item) return;

      const photoPath = item.photos && item.photos[0] ? item.photos[0] : 'assets/photos/Photo.png';
      const normalPath = item.normalMap || '';

      let modalHTML = `... (твій повний модальний код) ...`; // я можу вставити повний, якщо потрібно

      // Тимчасово для діагностики
      console.log("Item data:", item);
      console.log("Photo path:", photoPath);
      console.log("Normal path:", normalPath);

      alert("Модальне відкрито. Перевір консоль (F12) — там видно шляхи.");
    };

    window.onload = loadData;
  </script>
</body>
</html>
