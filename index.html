<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова експозиція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light p-5">

  <div class="container">
    <h1 class="fw-light text-center mb-5">Експозиція</h1>

    <div id="exhibitsGrid" class="row row-cols-1 row-cols-md-3 g-4"></div>
  </div>

  <script>
    // Дані прямо в коді — найнадійніший варіант
    const collection = [
      {
        id: "exp-001",
        inventory: "МК-001",
        title: "Горщик ліпний",
        shortDesc: "X–XI ст., слов'янська кераміка",
        description: "Ліпний горщик з характерним орнаментом.",
        photos: ["photos/Photo.png"]
      }
    ];

    function render() {
      const grid = document.getElementById('exhibitsGrid');
      grid.innerHTML = '';

      collection.forEach(item => {
        const card = `
          <div class="col">
            <div class="card h-100 shadow-sm" onclick="alert('Клік працює!\\nНазва: ${item.title}')" style="cursor:pointer;">
              <img src="assets/${item.photos[0]}" class="card-img-top" style="height:280px; object-fit:cover;" alt="${item.title}">
              <div class="card-body">
                <small class="text-muted">${item.inventory}</small>
                <h5 class="card-title mt-1">${item.title}</h5>
                <p class="card-text text-muted small">${item.shortDesc}</p>
              </div>
            </div>
          </div>`;
        grid.innerHTML += card;
      });
    }

    window.onload = render;
  </script>
</body>
</html>
