<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова експозиція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
    <div class="container">
      <span class="museum-name text-muted fs-5">Назва музею</span>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="fw-light text-center mb-5">Експозиція</h1>
    
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm" style="cursor:pointer;" onclick="showDetail()">
          <img src="assets/photos/Photo.png" class="card-img-top" style="height: 320px; object-fit: cover;">
          <div class="card-body text-center">
            <small class="text-muted">МК-001</small>
            <h5 class="card-title mt-2">Горщик ліпний</h5>
            <p class="card-text text-muted small">X–XI ст., слов'янська кераміка</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="bg-white border-top py-4 text-center text-muted small">
    © Ваш Музей • Цифрова колекція
  </footer>

  <script>
    function showDetail() {
      let html = `
        <div class="modal fade show" id="myModal" style="display:block; background:rgba(0,0,0,0.7);">
          <div class="modal-dialog modal-xl">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Горщик ліпний</h5>
                <button type="button" class="btn-close" onclick="document.getElementById('myModal').remove()"></button>
              </div>
              <div class="modal-body">
                <ul class="nav nav-tabs mb-3">
                  <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#desc">Опис</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#photo">Фото</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#volume">Об’єм</a></li>
                </ul>
                <div class="tab-content">
                  <div class="tab-pane fade show active" id="desc">
                    <p><strong>Інвентарний номер:</strong> МК-001</p>
                    <p><strong>Матеріал:</strong> Глина</p>
                    <p><strong>Дата:</strong> X–XI ст.</p>
                    <hr>
                    <p>Ліпний горщик з характерним орнаментом.</p>
                  </div>
                  <div class="tab-pane fade" id="photo">
                    <img src="assets/photos/Photo.png" class="img-fluid rounded">
                  </div>
                  <div class="tab-pane fade" id="volume" style="height:520px;">
                    <iframe src="https://sketchfab.com/models/33556cd311d64a0c924c091bf750cd45/embed" 
                            style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button class="btn btn-secondary" onclick="document.getElementById('myModal').remove()">Закрити</button>
              </div>
            </div>
          </div>
        </div>`;

      document.body.insertAdjacentHTML('beforeend', html);
    }
  </script>
</body>
</html>
