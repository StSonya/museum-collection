<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIGICURE — Цифрова експозиція</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/STLLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/controls/OrbitControls.js"></script>
    
    <style>
        .modal { animation: modalPop 0.3s ease; }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        #stl-container { width: 100%; height: 520px; background: #111827; border-radius: 16px; }
    </style>
</head>
<body class="bg-zinc-950 text-white font-sans">

    <!-- ... (та сама навігація та герой, як у попередній версії) ... -->

    <!-- Галерея залишається такою ж -->

    <!-- Модальне вікно (оновлене) -->
    <div id="modal" class="hidden fixed inset-0 bg-black/90 z-[9999] flex items-center justify-center p-4">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-5xl max-h-[92vh] flex flex-col modal shadow-2xl overflow-hidden">
            <div class="px-8 py-6 border-b border-zinc-700 flex items-center justify-between">
                <div>
                    <h2 id="modal-title" class="text-3xl font-semibold"></h2>
                    <p id="modal-author" class="text-zinc-400"></p>
                </div>
                <button onclick="closeModal()" class="text-5xl leading-none text-zinc-400 hover:text-white">×</button>
            </div>
            
            <div class="flex border-b border-zinc-700">
                <button onclick="switchTab(0)" id="tab0" class="tab-btn flex-1 py-4 font-medium border-b-2 border-transparent hover:text-white">Опис</button>
                <button onclick="switchTab(1)" id="tab1" class="tab-btn flex-1 py-4 font-medium border-b-2 border-transparent hover:text-white">3D-модель</button>
            </div>

            <div class="flex-1 p-8 overflow-auto">
                <!-- Вкладка Опис -->
                <div id="tab-content-0">
                    <p id="modal-description" class="text-zinc-300 text-lg"></p>
                </div>
                
                <!-- Вкладка 3D -->
                <div id="tab-content-1" class="hidden">
                    <div id="stl-container"></div>
                    <p class="text-xs text-zinc-500 mt-3 text-center">
                        Миша — обертання • Колесо — масштаб • Правий клік — панорамування
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== ДАНІ МОДЕЛЕЙ ====================
        const models = [
            {
                id: 1,
                title: "Горщик ліпний",
                author: "Ім'я студента",
                type: "photogrammetry",           // або "rti"
                description: "X–XI ст., слов’янська кераміка. MK-001",
                // Для Sketchfab
                sketchfabEmbedSrc: null,
                // Для STL (пряме посилання на raw файл)
                stlUrl: "https://raw.githubusercontent.com/ВАШ_ЮЗЕРНЕЙМ/digicure-exhibition/main/models/gorshyk.stl",
                thumbnail: "https://via.placeholder.com/600x400/1e2937/64748b?text=Горщик+ліпний"
            }
            // Додавай нові об'єкти...
        ];

        let currentModel = null;
        let scene, camera, renderer, controls;

        function renderGallery(filteredModels) { /* той самий код, що був раніше */ }

        // ==================== МОДАЛЬНЕ ВІКНО ====================
        function openModal(id) {
            currentModel = models.find(m => m.id === id);
            if (!currentModel) return;

            document.getElementById('modal-title').textContent = currentModel.title;
            document.getElementById('modal-author').textContent = currentModel.author;
            document.getElementById('modal-description').innerHTML = `<p>${currentModel.description}</p>`;

            switchTab(0); // за замовчуванням відкриваємо вкладку Опис
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal').classList.add('flex');
        }

        function switchTab(tabIndex) {
            document.querySelectorAll('.tab-btn').forEach((btn, i) => {
                btn.classList.toggle('border-blue-500', i === tabIndex);
                btn.classList.toggle('text-white', i === tabIndex);
            });

            document.getElementById('tab-content-0').classList.toggle('hidden', tabIndex !== 0);
            document.getElementById('tab-content-1').classList.toggle('hidden', tabIndex !== 1);

            if (tabIndex === 1 && currentModel.stlUrl) {
                setTimeout(initSTLViewer, 100); // невелика затримка для рендеру
            }
        }

        function initSTLViewer() {
            const container = document.getElementById('stl-container');
            container.innerHTML = ''; // очищаємо попередній

            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111827);

            camera = new THREE.PerspectiveCamera(50, container.clientWidth / 520, 0.1, 1000);
            camera.position.set(0, 0, 150);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, 520);
            container.appendChild(renderer.domElement);

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const directional = new THREE.DirectionalLight(0xffffff, 1);
            directional.position.set(50, 100, 50);
            scene.add(directional);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // Завантаження STL
            const loader = new THREE.STLLoader();
            loader.load(currentModel.stlUrl, geometry => {
                const material = new THREE.MeshPhongMaterial({ 
                    color: 0xaaaaaa, 
                    specular: 0x111111, 
                    shininess: 5 
                });
                const mesh = new THREE.Mesh(geometry, material);
                
                // Центруємо та масштабуємо модель
                geometry.computeBoundingBox();
                const center = geometry.boundingBox.getCenter(new THREE.Vector3());
                mesh.position.sub(center);
                
                const size = geometry.boundingBox.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                const scale = 80 / maxDim;
                mesh.scale.set(scale, scale, scale);

                scene.add(mesh);
            });

            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }
            animate();

            // Resize
            window.addEventListener('resize', () => {
                if (renderer) {
                    renderer.setSize(container.clientWidth, 520);
                    camera.aspect = container.clientWidth / 520;
                    camera.updateProjectionMatrix();
                }
            });
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            // очищаємо three.js щоб не залишалося в пам'яті
            if (renderer) renderer.dispose();
        }

        // ==================== ЗАПУСК ====================
        document.addEventListener('DOMContentLoaded', () => {
            // ... setupFilters() і renderGallery() як раніше ...
        });
    </script>
</body>
</html>
