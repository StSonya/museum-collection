<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова експозиція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light">

  <div class="container py-5">
    <h1 class="fw-light text-center mb-5">Експозиція</h1>
    
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow-sm" style="cursor:pointer;" onclick="showDetail()">
          <img src="assets/photos/Photo.png" class="card-img-top" style="height: 320px; object-fit: cover;">
          <div class="card-body text-center">
            <small class="text-muted">МК-001</small>
            <h5 class="card-title">Горщик ліпний</h5>
            <p class="text-muted small">X–XI ст., слов'янська кераміка</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showDetail() {
      const modalHTML = `
        <div class="modal fade show" id="detailModal" style="display: block; background: rgba(0,0,0,0.6);">
          <div class="modal-dialog modal-lg">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Горщик ліпний</h5>
                <button type="button" class="btn-close" onclick="document.getElementById('detailModal').remove()"></button>
              </div>
              <div class="modal-body">
                <ul class="nav nav-tabs mb-3">
                  <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#desc">Опис</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#photo">Фото</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#volume">Об’єм</a></li>
                </ul>
                <div class="tab-content">
                  <div class="tab-pane fade show active" id="desc">
                    <p><strong>Інвентарний номер:</strong> МК-001</p>
                    <p><strong>Матеріал:</strong> Глина</p>
                    <p><strong>Дата:</strong> X–XI ст.</p>
                    <p>Ліпний горщик з характерним орнаментом.</p>
                  </div>
                  <div class="tab-pane fade" id="photo">
                    <img src="assets/photos/Photo.png" class="img-fluid rounded">
                  </div>
                  <div class="tab-pane fade" id="volume">
                    <p class="text-center mt-5">Вкладка Об’єм (поки порожня)</p>
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button class="btn btn-secondary" onclick="document.getElementById('detailModal').remove()">Закрити</button>
              </div>
            </div>
          </div>
        </div>`;

      // Видаляємо старий модал, якщо є
      const old = document.getElementById('detailModal');
      if (old) old.remove();

      document.body.insertAdjacentHTML('beforeend', modalHTML);
    }
  </script>
</body>
</html>
