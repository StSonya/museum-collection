<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова колекція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
    <div class="container">
      <span class="museum-name text-muted fs-5">Назва музею</span>
      <div class="ms-auto">
        <a href="catalog.html" class="btn btn-outline-dark btn-sm">Весь каталог</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="fw-light text-center mb-5">Експозиція</h1>
    <div id="exhibitsGrid" class="row row-cols-1 row-cols-md-3 g-4"></div>
  </div>

  <footer class="bg-white border-top py-4 text-center text-muted small">
    © Ваш Музей • Цифрова колекція
  </footer>

  <script src="data.json"></script>
  <script src="assets/js/main.js"></script>

  <script>
    window.onload = function() {
      console.log("Завантажено експонатів:", window.collection ? window.collection.length : 0);
      
      if (window.collection && window.collection.length > 0) {
        const grid = document.getElementById('exhibitsGrid');
        grid.innerHTML = '';
        
        window.collection.forEach(item => {
          const card = `
            <div class="col">
              <div class="card h-100 border-0 shadow-sm" onclick="showDetail('${item.id}')">
                <img src="assets/${item.photos[0]}" class="card-img-top" style="height:280px; object-fit:cover;" alt="${item.title}">
                <div class="card-body">
                  <small class="text-muted">${item.inventory}</small>
                  <h5 class="card-title mt-1">${item.title}</h5>
                  <p class="card-text text-muted small">${item.shortDesc}</p>
                </div>
              </div>
            </div>`;
          grid.innerHTML += card;
        });
      } else {
        document.getElementById('exhibitsGrid').innerHTML = '<div class="col"><div class="alert alert-warning">Експонати не завантажились. Перевір data.json</div></div>';
      }
    };
  </script>
</body>
</html>
