<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова експозиція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
    <div class="container">
      <span class="museum-name text-muted fs-5">Назва музею</span>
      <div class="ms-auto">
        <a href="catalog.html" class="btn btn-outline-dark btn-sm">Весь каталог</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="fw-light text-center mb-5">Експозиція</h1>
    <div id="exhibitsGrid" class="row row-cols-1 row-cols-md-3 g-4"></div>
  </div>

  <footer class="bg-white border-top py-4 text-center text-muted small">
    © Ваш Музей • Цифрова колекція
  </footer>

  <script>
    const collection = [
      {
        id: "exp-001",
        inventory: "МК-001",
        title: "Горщик ліпний",
        shortDesc: "X–XI ст., слов'янська кераміка",
        material: "Глина",
        technique: "Ліплення від руки",
        date: "X–XI ст.",
        dimensions: "Висота 18 см, діаметр 15 см",
        origin: "Розкопки біля с. Іванівка, 2018 р.",
        description: "Ліпний горщик з характерним орнаментом. Типовий зразок ранньослов'янської кераміки.",
        photos: ["photos/Photo.png"],
        model: "models/Cactus.glb",
        normalMap: "normalmaps/Cactus_u0_v0_normal.png",
        sketchfabUrl: ""
      }
    ];

    function showDetail(id) {
      const item = collection.find(i => i.id === id);
      if (!item) return;

      let modalHTML = `
        <div class="modal fade" id="detailModal" tabindex="-1">
          <div class="modal-dialog modal-xl">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">${item.title}</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
              </div>
              <div class="modal-body">
                <ul class="nav nav-tabs mb-3">
                  <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#tab-desc">Опис</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-photo">Фото</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-light">Світло</a></li>
                  <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#tab-volume">Об’єм</a></li>
                </ul>
                <div class="tab-content">
                  <div class="tab-pane fade show active" id="tab-desc">
                    <p><strong>Інвентарний номер:</strong> ${item.inventory}</p>
                    <p><strong>Матеріал:</strong> ${item.material}</p>
                    <p><strong>Техніка:</strong> ${item.technique || '—'}</p>
                    <p><strong>Дата:</strong> ${item.date}</p>
                    <p><strong>Розміри:</strong> ${item.dimensions}</p>
                    <p><strong>Походження:</strong> ${item.origin}</p>
                    <hr>
                    <p>${item.description}</p>
                  </div>
                  <div class="tab-pane fade" id="tab-photo">
                    <img src="assets/${item.photos[0]}" class="img-fluid rounded" alt="${item.title}">
                  </div>
                  <div class="tab-pane fade" id="tab-light">
                    <canvas id="normalCanvas" width="900" height="520" style="width:100%; background:#111;"></canvas>
                  </div>
                  <div class="tab-pane fade" id="tab-volume">
                    ${item.model ? 
                      `<model-viewer src="assets/${item.model}" style="width:100%; height:520px;" camera-controls auto-rotate shadow-intensity="1"></model-viewer>` : 
                      (item.sketchfabUrl ? 
                        `<iframe src="${item.sketchfabUrl}/embed" style="width:100%; height:520px; border:none;" allowfullscreen></iframe>` : 
                        '<p class="text-muted">3D-модель відсутня</p>')
                    }
                  </div>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрити</button>
              </div>
            </div>
          </div>
        </div>`;

      const old = document.getElementById('detailModal');
      if (old) old.remove();

      document.body.insertAdjacentHTML('beforeend', modalHTML);
      new bootstrap.Modal(document.getElementById('detailModal')).show();
    }

    function renderExhibits() {
      const grid = document.getElementById('exhibitsGrid');
      grid.innerHTML = '';

      collection.forEach(item => {
        const card = `
          <div class="col">
            <div class="card h-100 border-0 shadow-sm" style="cursor:pointer;" onclick="showDetail('${item.id}')">
              <img src="assets/${item.photos[0]}" class="card-img-top" style="height: 280px; object-fit: cover;" alt="${item.title}">
              <div class="card-body">
                <small class="text-muted">${item.inventory}</small>
                <h5 class="card-title mt-1">${item.title}</h5>
                <p class="card-text text-muted small">${item.shortDesc}</p>
              </div>
            </div>
          </div>`;
        grid.innerHTML += card;
      });
    }

    window.onload = renderExhibits;
  </script>
</body>
