<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Цифрова експозиція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light p-4">

  <h1 class="text-center mb-5">Експозиція</h1>

  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card shadow-sm" style="cursor:pointer;" onclick="showDetail()">
        <img src="assets/photos/Photo.png" class="card-img-top" style="height: 320px; object-fit: cover;">
        <div class="card-body text-center">
          <small>МК-001</small>
          <h5>Горщик ліпний</h5>
          <p class="text-muted small">X–XI ст., слов'янська кераміка</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    function showDetail() {
      alert("Клік працює! Модальне вікно має відкритися...");

      const modal = document.createElement('div');
      modal.innerHTML = `
        <div class="modal fade show" style="display:block; background:rgba(0,0,0,0.5);">
          <div class="modal-dialog modal-lg">
            <div class="modal-content">
              <div class="modal-header">
                <h5 class="modal-title">Горщик ліпний</h5>
                <button type="button" class="btn-close" onclick="this.closest('.modal').remove()"></button>
              </div>
              <div class="modal-body">
                <p><strong>Інвентарний номер:</strong> МК-001</p>
                <p><strong>Матеріал:</strong> Глина</p>
                <p><strong>Дата:</strong> X–XI ст.</p>
                <hr>
                <img src="assets/photos/Photo.png" class="img-fluid rounded">
              </div>
              <div class="modal-footer">
                <button class="btn btn-secondary" onclick="this.closest('.modal').remove()">Закрити</button>
              </div>
            </div>
          </div>
        </div>`;
      document.body.appendChild(modal);
    }
  </script>
</body>
</html>
