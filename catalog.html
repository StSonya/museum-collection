<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог — Цифрова колекція</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3">
    <div class="container">
      <a href="index.html" class="museum-name text-muted fs-5 text-decoration-none">Назва музею</a>
      <div class="ms-auto">
        <a href="index.html" class="btn btn-outline-secondary btn-sm">На головну</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h1 class="fw-light mb-4">Каталог експонатів</h1>

    <div class="row mb-4">
      <div class="col-lg-4">
        <input type="text" id="searchInput" class="form-control" placeholder="Пошук за назвою або описом...">
      </div>
      <div class="col-lg-3">
        <select id="sectionFilter" class="form-select">
          <option value="">Всі теми</option>
        </select>
      </div>
    </div>

    <div id="catalogGrid" class="row row-cols-1 row-cols-md-3 g-4"></div>
  </div>

  <footer class="bg-white border-top py-4 text-center text-muted small">
    © Ваш Музей • Цифрова колекція
  </footer>

  <script src="data.json"></script>
  <script src="assets/js/main.js"></script>
  <script>
    function populateSectionFilter(data) {
      const select = document.getElementById('sectionFilter');
      const sections = [...new Set(data.map(item => item.section))];
      sections.forEach(s => {
        select.innerHTML += `<option value="${s}">${s}</option>`;
      });
    }

    function renderCatalog(data) {
      const container = document.getElementById('catalogGrid');
      container.innerHTML = '';
      data.forEach(item => {
        const card = `
          <div class="col">
            <div class="card h-100 border-0 shadow-sm" onclick="showDetail('${item.id}')">
              <div class="position-relative">
                <img src="assets/${item.photos[0]}" class="card-img-top" style="height: 260px; object-fit: cover;" alt="">
                <div class="mode-badge">2D</div>
              </div>
              <div class="card-body">
                <small class="text-muted">${item.inventory}</small>
                <h5 class="card-title mt-1">${item.title}</h5>
                <p class="card-text text-muted small">${item.shortDesc}</p>
              </div>
            </div>
          </div>`;
        container.innerHTML += card;
      });
    }

    function filterCatalog() {
      const term = document.getElementById('searchInput').value.toLowerCase().trim();
      const section = document.getElementById('sectionFilter').value;
      
      let filtered = window.collection || [];
      if (section) filtered = filtered.filter(i => i.section === section);
      if (term) {
        filtered = filtered.filter(i => 
          i.title.toLowerCase().includes(term) || 
          (i.description && i.description.toLowerCase().includes(term))
        );
      }
      renderCatalog(filtered);
    }

    window.onload = () => {
      if (window.collection) {
        populateSectionFilter(window.collection);
        renderCatalog(window.collection);

        document.getElementById('searchInput').addEventListener('input', filterCatalog);
        document.getElementById('sectionFilter').addEventListener('change', filterCatalog);
      }
    };
  </script>
</body>
</html>
